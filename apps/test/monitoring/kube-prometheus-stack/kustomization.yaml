resources:
- ../../../base/monitoring/kube-prometheus-stack/
patches:
- target:
    kind: HelmRelease
    name: kube-prometheus-stack
  path: helmrelease-patch.yaml
- target:
    kind: Ingress
    name: thanos-query-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: thanos-query.composter.int.sambaum.ch
    - op: replace
      path: /spec/tls/0/hosts
      value: [thanos-query.composter.int.sambaum.ch]
    - op: replace
      path: /metadata/annotations/cert-manager.io~1cluster-issuer
      value: letsencrypt-production

- target:
    kind: HelmRelease
    name: thanos
  patch: |-
    - op: replace
      path: /spec/values/query/ingress/hosts/0
      value: thanos-query.composter.int.sambaum.ch
    - op: replace
      path: /spec/values/query/ingress/tls/0/hosts/0
      value: thanos-query.composter.int.sambaum.ch

configMapGenerator:
- name: thanos-datasources-external
  namespace: monitoring
  files:
  - thanos-datasources.yaml
  options:
    labels:
      grafana_datasource: "1"
