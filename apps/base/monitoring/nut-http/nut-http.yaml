apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-http
  namespace: monitoring
  labels:
    app: nut-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nut-http
  template:
    metadata:
      labels:
        app: nut-http
    spec:
      containers:
      - name: nut-http
        image: deetoreu/nut-http@sha256:6df1970ccdddf3e46093e4cd5c675c943c6a3a4e21ac8a03ed930227451c2193
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: NUT_ADDRESS
          value: 'truenas.int.sambaum.ch'
        livenessProbe:
          httpGet:
            path: /devices/ups
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---
kind: Service
apiVersion: v1
metadata:
  name: nut-http-service
  namespace: monitoring
spec:
  selector:
    app: nut-http
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nut-http-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: NTP-HTTP UPS
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: ups.png
    gethomepage.dev/name: NTU-HTTP
    gethomepage.dev/pod-selector: app=nut-http
    monitoring.gatus.dev/path: /devices/ups
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 'nut-http.example.com'
    secretName: nut-http-tls
  rules:
  - host: nut-http.example.com
    http:
      paths:
      - pathType: Prefix
        path: '/'
        backend:
          service:
            name: nut-http-service
            port:
              number: 3001
