apiVersion: v1
kind: PersistentVolume
metadata:
  name: loki-promtail-pv
  labels:
    app: loki
spec:
  storageClassName: openebs-local-hostpath-monitoring-data-sc
  capacity:
    storage: 50Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: "/data/monitoring/loki-promtail-pv"
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openebs-local-hostpath-monitoring-data-pvc-loki-promtail
  namespace: monitoring
  labels:
    app: loki
spec:
  storageClassName: openebs-local-hostpath-monitoring-data-sc
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  volumeName: loki-promtail-pv
  selector:
    matchLabels:
      app: loki
