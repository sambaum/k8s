apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-user
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-user-admin
subjects:
- kind: ServiceAccount
  name: headlamp-user
  namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-user-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: headlamp-user
type: kubernetes.io/service-account-token

# once deployed, retrieve the token:
# kubectl get secret headlamp-user-token -n default -o jsonpath='{.data.token}' | base64 -d
# use this token to authenticate
