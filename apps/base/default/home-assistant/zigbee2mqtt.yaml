apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee2mqtt
    spec:
      initContainers:
      - name: init-config
        image: busybox:1.37.0
        command:
        - sh
        - -c
        - if [ ! -f /data/configuration.yaml ]; then cp /config/configuration.yaml /data/configuration.yaml; fi
        volumeMounts:
        - name: data
          mountPath: /data
          subPath: zigbee2mqtt
        - name: config
          mountPath: /config
      containers:
      - name: zigbee2mqtt
        image: ghcr.io/koenkk/zigbee2mqtt:2.10.1
        env:
        - name: TZ
          value: Europe/Zurich
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /app/data
          subPath: zigbee2mqtt
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: local-conf-pvc
      - name: config
        configMap:
          name: zigbee2mqtt-config
---

apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: zigbee2mqtt
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zigbee2mqtt-ingress
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: Zigbee to MQTT bridge
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: zigbee2mqtt.svg
    gethomepage.dev/name: Zigbee2MQTT
    gethomepage.dev/pod-selector: app.kubernetes.io/name=zigbee2mqtt
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - zigbee2mqtt.example.com
    secretName: zigbee2mqtt-tls
  rules:
  - host: zigbee2mqtt.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zigbee2mqtt
            port:
              number: 8080
