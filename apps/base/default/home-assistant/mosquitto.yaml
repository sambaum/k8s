apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: default
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2.0.22
        ports:
        - containerPort: 1883
        volumeMounts:
        - name: data
          mountPath: /mosquitto/data
          subPath: mosquitto
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: local-conf-pvc
      - name: config
        configMap:
          name: mosquitto-config
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: default
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
  selector:
    app.kubernetes.io/name: mosquitto
