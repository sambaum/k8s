apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: default
  labels:
    app: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      initContainers:
      - name: init-permissions
        image: busybox:1.37.0
        command: [ 'sh', '-c', 'chown -R 1000:1000 /config' ]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - mountPath: /config
          name: config
          subPath: bazarr
      containers:
      - name: bazarr
        image: linuxserver/bazarr:1.5.6
        securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ ALL ], add: [ SETUID, SETGID ] } }
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6767
        volumeMounts:
        - mountPath: /config
          name: config
          subPath: bazarr
        - mountPath: /tv
          name: media
          subPath: Video/TV-Shows
        - mountPath: /movies
          name: media
          subPath: Video/Movies
        - mountPath: /tv-kids
          name: media
          subPath: Video/TV-Shows-Kids
        - mountPath: /movies-kids
          name: media
          subPath: Video/Movies-Kids
        env:
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: TZ
          value: 'Europe/Zurich'
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: local-conf-pvc
      - name: media
        persistentVolumeClaim:
          claimName: truenas-media-pvc
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---
kind: Service
apiVersion: v1
metadata:
  name: bazarr-service
  namespace: default
spec:
  selector:
    app: bazarr
  ports:
  - protocol: TCP
    port: 6767
    targetPort: 6767
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazarr-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: Bazarr Subtitle Management
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: bazarr.svg
    gethomepage.dev/name: Bazarr
    gethomepage.dev/pod-selector: app=bazarr
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 'bazarr.example.com'
    secretName: bazarr-tls
  rules:
  - host: bazarr.example.com
    http:
      paths:
      - pathType: Prefix
        path: '/'
        backend:
          service:
            name: bazarr-service
            port:
              number: 6767
