apiVersion: apps/v1
kind: Deployment
metadata:
  name: searcharr
  namespace: default
  labels:
    app: searcharr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searcharr
  template:
    metadata:
      labels:
        app: searcharr
    spec:
      containers:
      - name: searcharr
        image: toddrob/searcharr:v3.4.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - mountPath: /app/data
          name: config
          subPath: searcharr/data
        - mountPath: /app/logs
          name: data
          subPath: searcharr
        env:
        - name: TZ
          value: 'Europe/Zurich'
        # Searcharr's Telegram long-poll can silently stall: the process stays
        # alive but stops polling and holds no connection to api.telegram.org.
        # A healthy bot keeps an ESTABLISHED connection on remote port 443 (01BB);
        # Sonarr/Radarr are plain HTTP/80, so 443 == Telegram. Zero such
        # connections => polling is dead => restart the pod.
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - 'grep -qE " [0-9A-F]+:01BB 01 " /proc/1/net/tcp'
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: local-conf-pvc
      - name: data
        persistentVolumeClaim:
          claimName: local-data-pvc
      dnsConfig:
        options:
        - name: ndots
          value: "1"
