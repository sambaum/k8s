apiVersion: apps/v1
kind: Deployment
metadata:
  name: iptv-merger
  namespace: default
  labels:
    app: iptv-merger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iptv-merger
  template:
    metadata:
      labels:
        app: iptv-merger
    spec:
      initContainers:
      - name: fetch-playlists
        image: alpine:3.24
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "/scripts/merge.sh"]
        volumeMounts:
        - mountPath: /scripts
          name: config
        - mountPath: /usr/share/nginx/html
          name: html
      containers:
      - name: nginx
        image: nginx:1.31-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: html
        - mountPath: /etc/nginx/conf.d/default.conf
          name: config
          subPath: default.conf
      - name: refresh
        image: alpine:3.24
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - while true; do sleep 86400; /scripts/merge.sh; done
        volumeMounts:
        - mountPath: /scripts
          name: config
        - mountPath: /usr/share/nginx/html
          name: html
      volumes:
      - name: config
        configMap:
          name: iptv-merger-config
          defaultMode: 0755
      - name: html
        emptyDir: {}
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---
kind: Service
apiVersion: v1
metadata:
  name: iptv-merger-service
  namespace: default
spec:
  selector:
    app: iptv-merger
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iptv-merger-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: IPTV Playlist Merger
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: tv.svg
    gethomepage.dev/name: IPTV Merger
    gethomepage.dev/pod-selector: app=iptv-merger
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 'm3u.example.com'
    secretName: iptv-merger-tls
  rules:
  - host: m3u.example.com
    http:
      paths:
      - pathType: Prefix
        path: '/'
        backend:
          service:
            name: iptv-merger-service
            port:
              number: 80
