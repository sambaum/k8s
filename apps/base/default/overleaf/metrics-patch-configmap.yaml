apiVersion: v1
kind: ConfigMap
metadata:
  name: overleaf-metrics-patch
  namespace: default
# Patches two files from the shared @overleaf/metrics library via subPath mounts.
# The files are otherwise identical to the originals in the image — only the
# sections marked with inline comments below are new. On upgrade, diff against
# the image's /overleaf/libraries/metrics/ to check if the originals changed.
data:
  # Change: adds eventLoopMonitoringPrecision: 5000 to initializePrometheus().
  # prom-client v14 renamed the 'timeout' option to 'eventLoopMonitoringPrecision';
  # the old key is silently ignored, leaving the default at 10ms — causing ~260
  # timer wakeups/second per service. The rest of this file is unchanged.
  initialize.js: |
    /* eslint-disable no-console */

    /**
     * This module initializes the metrics module. It should be imported once
     * before any other module to support code instrumentation.
     */

    const metricsModuleImportStartTime = performance.now()

    const APP_NAME = process.env.METRICS_APP_NAME || 'unknown'
    const BUILD_VERSION = process.env.BUILD_VERSION
    const ENABLE_PROFILE_AGENT = process.env.ENABLE_PROFILE_AGENT === 'true'
    const GCP_OPENTELEMETRY = process.env.GCP_OPENTELEMETRY === 'true'
    const JAEGER_OPENTELEMETRY = process.env.JAEGER_OPENTELEMETRY === 'true'

    console.log('Initializing metrics')

    if (GCP_OPENTELEMETRY || JAEGER_OPENTELEMETRY) {
      initializeOpenTelemetryInstrumentation()
      initializeOpenTelemetryLogging()
    }

    if (ENABLE_PROFILE_AGENT) {
      initializeProfileAgent()
    }

    initializePrometheus()
    initializePromWrapper()
    recordProcessStart()

    function initializeOpenTelemetryInstrumentation() {
      console.log('Starting OpenTelemetry instrumentation')
      const opentelemetry = require('@opentelemetry/sdk-node')
      const {
        getNodeAutoInstrumentations,
      } = require('@opentelemetry/auto-instrumentations-node')
      const { Resource } = require('@opentelemetry/resources')
      const {
        SemanticResourceAttributes,
      } = require('@opentelemetry/semantic-conventions')

      const resource = new Resource({
        [SemanticResourceAttributes.SERVICE_NAME]: APP_NAME,
        [SemanticResourceAttributes.SERVICE_NAMESPACE]: 'Overleaf',
        'host.type': 'VM',
      })

      let exporter
      if (GCP_OPENTELEMETRY) {
        const GCP = require('@google-cloud/opentelemetry-cloud-trace-exporter')
        exporter = new GCP.TraceExporter()
      } else if (JAEGER_OPENTELEMETRY) {
        const {
          OTLPTraceExporter,
        } = require('@opentelemetry/exporter-trace-otlp-http')
        exporter = new OTLPTraceExporter({
          url: `http://$${process.env.JAEGER_HOST || 'jaeger'}:4318/v1/traces`,
        })
      } else {
        return
      }

      const sdk = new opentelemetry.NodeSDK({
        traceExporter: exporter,
        logger: console,
        instrumentations: [getNodeAutoInstrumentations()],
        resource,
      })
      sdk.start()
    }

    function initializeOpenTelemetryLogging() {
      const {
        diag,
        DiagConsoleLogger,
        DiagLogLevel,
      } = require('@opentelemetry/api')
      diag.setLogger(new DiagConsoleLogger(), DiagLogLevel.INFO)
    }

    function initializeProfileAgent() {
      console.log('Starting Google Profile Agent')
      const profiler = require('@google-cloud/profiler')
      profiler.start({
        serviceContext: {
          service: APP_NAME,
          version: BUILD_VERSION,
        },
      })
    }

    function initializePrometheus() {
      const os = require('node:os')
      const promClient = require('prom-client')
      promClient.register.setDefaultLabels({ app: APP_NAME, host: os.hostname() })
      // prom-client v14 renamed 'timeout' to 'eventLoopMonitoringPrecision'.
      // The old key is silently ignored, leaving the default at 10ms — causing
      // ~260 timer wakeups/second per service. Set it explicitly to 5000ms.
      promClient.collectDefaultMetrics({
        timeout: 5000,
        prefix: '',
        eventLoopMonitoringPrecision: parseInt(process.env.PROM_EVENTLOOP_PRECISION) || 5000,
      })
    }

    function initializePromWrapper() {
      const promWrapper = require('./prom_wrapper')
      promWrapper.setupSweeping()
    }

    function recordProcessStart() {
      const metrics = require('.')
      metrics.inc('process_startup')
    }

    module.exports = { metricsModuleImportStartTime }

  # Change: adds the minInterval block (3 lines after logThreshold).
  # document-updater hardcodes 100ms (10 wakeups/s); all other services default
  # to 1000ms. This enforces a 5000ms minimum so the timer doesn't wake the
  # event loop on an otherwise idle instance. The rest of this file is unchanged.
  event_loop.js: |
    module.exports = {
      monitor(logger, interval, logThreshold) {
        if (logThreshold == null) {
          logThreshold = 100
        }
        // Enforce a minimum interval via env var (default 5000ms).
        // document-updater hardcodes 100ms; all other services use 1000ms.
        // Neither is useful for a low-traffic homelab instance.
        const minInterval = parseInt(process.env.EVENT_LOOP_MONITOR_INTERVAL) || 5000
        interval = Math.max(interval || minInterval, minInterval)

        const Metrics = require('./index')
        if (logger == null) {
          throw new Error('logger is undefined')
        }
        let previous = Date.now()
        const intervalId = setInterval(function () {
          const now = Date.now()
          const offset = now - previous - interval
          if (offset > logThreshold) {
            logger.warn({ offset }, 'slow event loop')
          }
          previous = now
          return Metrics.timing('event-loop-millsec', offset)
        }, interval)

        return Metrics.registerDestructor(() => clearInterval(intervalId))
      },
    }
