apiVersion: apps/v1
kind: Deployment
metadata:
  name: overleaf
  namespace: default
  labels:
    app: overleaf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: overleaf
  template:
    metadata:
      labels:
        app: overleaf
    spec:
      containers:
      - name: overleaf
        image: tuetenk0pp/sharelatex-full:6.1.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /var/lib/overleaf
          name: config
          subPath: overleaf/overleaf
        - mountPath: /overleaf/libraries/metrics/initialize.js
          name: metrics-patch
          subPath: initialize.js
        - mountPath: /overleaf/libraries/metrics/event_loop.js
          name: metrics-patch
          subPath: event_loop.js
        env:
        - name: TZ
          value: 'Europe/Zurich'
        - name: OVERLEAF_MONGO_URL
          value: mongodb://overleaf-service-mongo/sharelatex?heartbeatFrequencyMS=60000&minHeartbeatFrequencyMS=10000 # default 10s topology polling × 12 services = noisy; 60s is enough
        - name: OVERLEAF_REDIS_HOST
          value: overleaf-service-redis
        - name: REDIS_HOST
          value: overleaf-service-redis
        - name: EMAIL_CONFIRMATION_DISABLED
          value: 'true'
        - name: OVERLEAF_SITE_URL
          value: https://overleaf.example.com
        - name: NGINX_WORKER_PROCESSES
          value: '1' # default is auto (= CPU count); 1 is enough for a single-user instance
      - name: mongo
        image: mongo:8.3
        args:
        - "--replSet"
        - "overleaf"
        - "--wiredTigerCacheSizeGB"
        - "0.25" # default is ~50% of RAM; smaller cache = less eviction activity
        - "--setParameter"
        - "diagnosticDataCollectionEnabled=false" # disables FTDC diagnostic collection (fires every 1s by default)
        - "--wiredTigerEngineConfigString"
        - "eviction=(threads_min=1,threads_max=1)" # default spawns up to 4 eviction threads; 1 is enough for a small idle cache
        - "--setParameter"
        - "journalCommitInterval=500" # max allowed (ms); reduces journal flushes from ~12/s to 2/s. cannot disable journaling on a replica set member.
        ports:
        - containerPort: 27017
        volumeMounts:
        - mountPath: /data/db
          name: config
          subPath: overleaf/mongodb
      - name: redis
        image: redis:8.8.1
        args: ["redis-server", "--hz", "1", "--dynamic-hz", "no"] # default hz=10 runs serverCron 10×/s; 1Hz is the minimum for an idle instance
        ports:
        - containerPort: 6379
        volumeMounts:
        - mountPath: /data
          name: config
          subPath: overleaf/redis
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: local-conf-pvc
      - name: metrics-patch
        configMap:
          name: overleaf-metrics-patch
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---
kind: Service
apiVersion: v1
metadata:
  name: overleaf-service
  namespace: default
spec:
  selector:
    app: overleaf
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
kind: Service
apiVersion: v1
metadata:
  name: overleaf-service-mongo
  namespace: default
spec:
  selector:
    app: overleaf
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
kind: Service
apiVersion: v1
metadata:
  name: overleaf-service-redis
  namespace: default
spec:
  selector:
    app: overleaf
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overleaf-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600' # Recommendation for Websockets
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600' # Recommendation for Websockets
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: Online-LaTeX-Editor
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: overleaf.svg
    gethomepage.dev/name: Overleaf
    gethomepage.dev/pod-selector: app=overleaf
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 'overleaf.example.com'
    secretName: overleaf-tls
  rules:
  - host: overleaf.example.com
    http:
      paths:
      - pathType: Prefix
        path: '/'
        backend:
          service:
            name: overleaf-service
            port:
              number: 80

# Call /launchpad to create first user.
