apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee2mqtt
    spec:
      containers:
      - name: zigbee2mqtt
        image: ghcr.io/koenkk/zigbee2mqtt:2.11.0
        env:
        - name: TZ
          value: Europe/Zurich
        - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED
          value: "true"
        - name: ZIGBEE2MQTT_CONFIG_MQTT_SERVER
          value: mqtt://mosquitto.default.svc.cluster.local:1883
        - name: ZIGBEE2MQTT_CONFIG_SERIAL_PORT
          value: tcp://sonoff.int.sambaum.ch:6638
        - name: ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER
          value: ember
        - name: ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED
          value: "true"
        - name: ZIGBEE2MQTT_CONFIG_FRONTEND_PORT
          value: "8080"
        - name: ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL
          value: "20"
        - name: ZIGBEE2MQTT_CONFIG_AVAILABILITY_ENABLED
          value: "true"
        - name: ZIGBEE2MQTT_CONFIG_AVAILABILITY_ACTIVE_TIMEOUT
          value: "1"
        - name: ZIGBEE2MQTT_CONFIG_AVAILABILITY_PASSIVE_TIMEOUT
          value: "1800"
        envFrom:
        - secretRef:
            name: zigbee2mqtt-secrets
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /app/data
          subPath: zigbee2mqtt
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: local-conf-pvc
      dnsConfig:
        options:
        - name: ndots
          value: "1"
---

apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: zigbee2mqtt
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zigbee2mqtt-ingress
  namespace: default
  labels:
    app.kubernetes.io/name: zigbee2mqtt
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    gethomepage.dev/description: Zigbee to MQTT bridge
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: More Apps
    gethomepage.dev/icon: zigbee2mqtt.svg
    gethomepage.dev/name: Zigbee2MQTT
    gethomepage.dev/pod-selector: app.kubernetes.io/name=zigbee2mqtt
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - zigbee2mqtt.example.com
    secretName: zigbee2mqtt-tls
  rules:
  - host: zigbee2mqtt.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zigbee2mqtt
            port:
              number: 8080
