resources:
- ../../../base/default/flamingo-jiggler-cdn/
patches:
- target:
    kind: Ingress
    name: flamingo-jiggler-cdn-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: flamingo-cdn.int.sambaum.ch
    - op: replace
      path: /spec/tls/0/hosts
      value: [flamingo-cdn.int.sambaum.ch]
    - op: replace
      path: /metadata/annotations/cert-manager.io~1cluster-issuer
      value: letsencrypt-production
