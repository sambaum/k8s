apiVersion: batch/v1
kind: CronJob
metadata:
  name: deletion-mark-cleanup
  namespace: monitoring
spec:
  schedule: "45 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
          - name: cleanup
            image: minio/mc:RELEASE.2025-08-13T08-35-41Z
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: mc-config
              mountPath: /.mc
            env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: rootPassword
            command:
            - sh
            - -c
            - |
              mc alias set minio http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              count=0
              mc ls minio/ > /tmp/buckets.txt
              while IFS= read -r line; do
                bucket="${line##* }"
                mc ls "minio/$bucket" > /tmp/prefixes.txt 2>/dev/null
                while IFS= read -r line2; do
                  prefix="${line2##* }"
                  if [ -z "$(mc ls --recursive "minio/$bucket$prefix" 2>/dev/null)" ]; then
                    mc rm --versions --recursive --force "minio/$bucket$prefix"
                    count=$((count + 1))
                  fi
                done < /tmp/prefixes.txt
              done < /tmp/buckets.txt
              echo "Removed $count ghost block directories"
          volumes:
          - name: tmp
            emptyDir: {}
          - name: mc-config
            emptyDir: {}
